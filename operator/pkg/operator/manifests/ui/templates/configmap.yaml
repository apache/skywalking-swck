{{- if eq .Spec.Kind "horizon" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Name }}-ui-horizon
  namespace: {{ .Namespace }}
  labels:
    app: ui
    operator.skywalking.apache.org/ui-name: {{ .Name }}
    operator.skywalking.apache.org/application: ui
    operator.skywalking.apache.org/component: configmap
data:
  horizon.yaml: |
{{- if .Spec.Config }}
{{ .Spec.Config | indent 4 }}
{{- else }}
    server:
      host: 0.0.0.0
      port: 8081
    oap:
      queryUrl: {{ .Spec.OAPServerAddress }}
      adminUrl: {{ .Spec.OAPServerAdminAddress }}
      zipkinUrl: {{ .Spec.OAPServerZipkinAddress }}
      timeoutMs: 15000
    auth:
      backend: local
      local:
        users: []
    rbac:
      enabled: true
      roles:
        viewer:
          - metrics:read
          - alarms:read
          - traces:read
          - logs:read
          - topology:read
          - profile:read
        admin:
          - "*"
      landingByRole:
        viewer: /
        admin: /admin/cluster
    session:
      ttlMinutes: 60
      cookieName: horizon_sid
      cookieSecure: false
    audit:
      file: /data/horizon-audit.jsonl
    setup:
      file: /data/horizon-setup.json
    alarms:
      file: /data/horizon-alarms.json
    debugLog:
      enabled: false
      file: /data/horizon-wire.jsonl
      maxBodyChars: 8192
      redactAuthHeaders: true
{{- end }}
{{- end }}
