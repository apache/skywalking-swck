{{- $isHorizon := eq .Spec.Kind "horizon" }}
{{- $port := 8080 }}
{{- if $isHorizon }}{{ $port = 8081 }}{{ end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-ui
  namespace: {{ .Namespace }}
  labels:
    app: ui
    operator.skywalking.apache.org/ui-name: {{ .Name }}
    operator.skywalking.apache.org/application: ui
    operator.skywalking.apache.org/component: deployment
spec:
  replicas: {{ .Spec.Instances }}
  minReadySeconds: 5
  selector:
    matchLabels:
      app: ui
      operator.skywalking.apache.org/ui-name: {{ .Name }}
  template:
    metadata:
      labels:
        app: ui
        operator.skywalking.apache.org/ui-name: {{ .Name }}
        operator.skywalking.apache.org/application: ui
        operator.skywalking.apache.org/component: deployment
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: ui
                    operator.skywalking.apache.org/ui-name: {{ .Name }}
      containers:
      - name: ui
        image: {{ .Spec.Image }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ $port }}
          name: page
        livenessProbe:
          initialDelaySeconds: 10
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          successThreshold: 1
          httpGet:
            path: /
            port: {{ $port }}
        readinessProbe:
          initialDelaySeconds: 10
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          successThreshold: 1
          httpGet:
            path: /
            port: {{ $port }}
        {{- if $isHorizon }}
        volumeMounts:
          - name: horizon-config
            mountPath: /app/horizon.yaml
            subPath: horizon.yaml
            readOnly: true
          - name: horizon-data
            mountPath: /data
        {{- else }}
        env:
          - name: SW_OAP_ADDRESS
            value: {{ .Spec.OAPServerAddress }}
        {{- end }}
      {{- if $isHorizon }}
      volumes:
        - name: horizon-config
          configMap:
            name: {{ .Name }}-ui-horizon
            items:
              - key: horizon.yaml
                path: horizon.yaml
        - name: horizon-data
          emptyDir: {}
      {{- end }}
