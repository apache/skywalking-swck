name: Continuous Integration
on:
  pull_request:
  push:
    branches:
      - master
concurrency:
  group: swck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Check License
        uses: apache/skywalking-eyes/header@501a28d2fb4a9b962661987e50cf0219631b32ff
      - name: Check
        run: make check
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Build
        run: make build
      - name: Build docker image
        run: make docker-build
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
        id: go
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: install kubebuilder
        run: ./hack/install-kubebuilder.sh
      - name: tests
        run: make test
  e2e-tests:
    name: e2e tests(oap+ui+agent)
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
        id: go
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Run E2E Test(oap+ui+agent)
        uses: apache/skywalking-infra-e2e@996ed8902e941e2883fcf0ac5b3090364942d205 # always prefer to use a revision instead of `main`.
        with:
          e2e-file: test/e2e/oap-ui-agent/e2e.yaml # need to run E2E file path
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        name: Upload Logs
        with:
          name: oap-ui-agent-logs
          path: ${{ env.SW_INFRA_E2E_LOG_DIR }}
  swagent-e2e-tests:
    name: e2e tests(oap+ui+swagent)
